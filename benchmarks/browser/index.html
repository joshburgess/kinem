<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kinem vs motion vs gsap — browser bench</title>
    <style>
      :root { color-scheme: light dark; font-family: ui-monospace, monospace; }
      body { margin: 0; padding: 16px; display: grid; gap: 12px; }
      h1 { font-size: 14px; margin: 0; }
      .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      button { padding: 4px 8px; font: inherit; cursor: pointer; }
      select, input { font: inherit; padding: 2px 4px; }
      #stage {
        position: relative;
        height: 420px;
        border: 1px solid #888;
        overflow: hidden;
        contain: strict;
      }
      .box {
        position: absolute;
        width: 12px;
        height: 12px;
        background: currentColor;
        will-change: auto;
      }
      pre#out {
        background: rgba(128, 128, 128, 0.1);
        padding: 8px;
        margin: 0;
        font-size: 12px;
        white-space: pre-wrap;
        min-height: 180px;
      }
    </style>
  </head>
  <body>
    <h1>kinem vs motion vs gsap — real-browser bench</h1>
    <div class="controls">
      <label>count <input id="count" type="number" value="200" min="1" max="5000" step="50" /></label>
      <label>scenario
        <select id="scenario">
          <option value="startup-commit">startup + first commit</option>
          <option value="startup-shared-def">startup, shared def across targets</option>
          <option value="cancel-before-first">cancel before first frame</option>
          <option value="steady-state">steady-state (10 frames)</option>
        </select>
      </label>
      <button id="run-kinem">run kinem</button>
      <button id="run-motion">run motion</button>
      <button id="run-gsap">run gsap</button>
      <button id="clear">clear stage</button>
    </div>
    <div id="stage"></div>
    <pre id="out">ready.</pre>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
