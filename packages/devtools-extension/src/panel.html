<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Kinem Panel</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <main id="app" data-connected="no">
      <header class="toolbar">
        <div class="brand">Kinem</div>
        <div id="status" class="status">Waiting for kinem on this page&hellip;</div>
        <button type="button" id="refresh">Refresh</button>
        <button type="button" id="pause-all">Pause all</button>
        <button type="button" id="resume-all">Resume all</button>
        <span class="sep"></span>
        <button type="button" id="record">Start recording</button>
        <span id="record-count" class="muted">0 events</span>
        <button type="button" id="export" disabled>Export</button>
        <button type="button" id="clear-log" disabled>Clear</button>
      </header>
      <section id="rows" class="rows"></section>
    </main>
    <script src="panel.js"></script>
  </body>
</html>
